name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger automatically when you push a tag like v1.0.0
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmake_args: -A Win32
            artifact_name: IndexWeaver.dll
            output_path: build/Release/IndexWeaver.dll
          - os: ubuntu-latest
            # Force 32-bit compilation on Linux via GCC flags
            cmake_args: -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32
            artifact_name: IndexWeaver.so
            output_path: build/IndexWeaver.so

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install 32-bit Toolchain (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y gcc-multilib g++-multilib

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}

    - name: Build Plugin
      run: cmake --build build --config Release

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.output_path }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') # Only run if a version tag was pushed
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: IndexWeaver.dll
          path: out
      
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: IndexWeaver.so
          path: out

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/IndexWeaver.dll
            out/IndexWeaver.so
          generate_release_notes: true
